# 1. Cấu hình kết nối MySQL 
# Thay 'localhost:3306' bằng địa chỉ IP nếu DB ở máy khác
spring.datasource.url=jdbc:mysql://localhost:3306/erp?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234

# 2. Driver cho MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Cấu hình JPA / Hibernate
# 'update': Tự động tạo bảng hoặc cập nhật thêm cột mới mà KHÔNG xóa dữ liệu cũ
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. Tên ứng dụng
spring.application.name=demo