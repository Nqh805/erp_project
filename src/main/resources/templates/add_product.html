<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: html_head}"> </head>
  <body class="product-page overflow-hidden">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="d-flex overflow-hidden" style="height: calc(100vh - 56px)">
      <div th:replace="~{fragments :: sidebar}"></div>
      <main class="flex-grow-1 p-4 overflow-y-auto bg-light h-100">
        <h1>Thông Tin Sản Phẩm</h1>
        <hr />

        <div
          th:if="${errorMessage}"
          class="alert alert-danger alert-dismissible fade show"
          role="alert"
        >
          <span th:text="${errorMessage}"></span>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
            aria-label="Close"
          ></button>
        </div>

        <form
          id="productForm"
          th:action="${product.id != null} ? @{/products/edit/{id}(id=${product.id})} : @{/products/add}"
          th:object="${product}"
          method="post"
          enctype="multipart/form-data"
        >
          <input type="hidden" name="action" id="formAction" value="save" />
          <input type="hidden" th:field="*{id}" />

          <h4 class="mb-3 text-primary border-bottom pb-2">
            1. Thông Tin Cơ Bản
          </h4>
          <div class="alert alert-info py-2">
            <i class="bi bi-info-circle"></i> Nhập thông tin cơ bản của sản
            phẩm. Những trường này giúp định danh và quản lý sản phẩm.
          </div>

          <div class="mb-3">
            <label for="productName" class="form-label">Tên Sản Phẩm *</label>
            <input
              type="text"
              class="form-control"
              id="productName"
              th:field="*{name}"
              placeholder="Nhập tên sản phẩm..."
              required
            />
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="parentCategory" class="form-label"
                >Ngành Hàng *</label
              >
              <select
                class="form-select"
                id="parentCategory"
                name="parentCategory"
                required
              >
                <option value="" selected disabled>Chọn ngành hàng...</option>
                <option
                  th:each="p : ${parentCategories}"
                  th:value="${p.id}"
                  th:text="${p.name}"
                  th:selected="${product?.category?.parent?.id == p.id}"
                ></option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="productType" class="form-label"
                >Loại Sản Phẩm *</label
              >
              <select
                class="form-select"
                id="productType"
                name="productType"
                required
              >
                <option value="" selected disabled>
                  Chọn loại sản phẩm...
                </option>
                <option
                  th:each="c : ${childCategories}"
                  th:value="${c.id}"
                  th:text="${c.name}"
                  th:selected="${product?.category?.id == c.id}"
                ></option>
              </select>
            </div>
          </div>

          <div class="row mb-3 align-items-center">
            <div class="col-md-3">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="checkNewCategory"
                />
                <label
                  class="form-check-label fst-italic"
                  for="checkNewCategory"
                >
                  Thêm Ngành Hàng Mới:
                </label>
              </div>
            </div>
            <div class="col-md-9">
              <input
                type="text"
                class="form-control"
                id="inputNewCategory"
                name="inputNewCategory"
                placeholder="Nhập ngành hàng mới..."
                disabled
              />
            </div>
          </div>

          <div class="row mb-3 align-items-center">
            <div class="col-md-3">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="checkNewType"
                />
                <label class="form-check-label fst-italic" for="checkNewType">
                  Thêm Loại SP Mới:
                </label>
              </div>
            </div>
            <div class="col-md-9">
              <input
                type="text"
                id="inputNewType"
                name="inputNewType"
                class="form-control"
                placeholder="Nhập loại sản phẩm mới..."
                disabled
              />
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="skuCode" class="form-label">Mã SKU *</label>
              <input
                type="text"
                id="skuCode"
                th:field="*{skuCode}"
                class="form-control"
                placeholder="VD: LAP-APP-MBPM3-14"
                required
              />
            </div>
            <div class="col-md-6">
              <label for="barCode" class="form-label"
                >Mã Vạch (Barcode) *</label
              >
              <div class="input-group">
                <input
                  type="text"
                  id="barCode"
                  th:field="*{barCode}"
                  class="form-control"
                  placeholder="Nhập mã vạch..."
                  required
                />
                <button
                  class="btn btn-outline-secondary"
                  type="button"
                  id="btnGenerateBarcode"
                >
                  <i class="bi bi-qr-code"></i> Sinh mã
                </button>
              </div>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="basePrice" class="form-label">Đơn Giá (VNĐ)</label>
              <input
                type="number"
                id="basePrice"
                th:field="*{basePrice}"
                class="form-control"
                placeholder="0"
                min="0"
              />
            </div>
            <div class="col-md-6">
              <label for="status" class="form-label fw-semibold"
                >Trạng Thái *</label
              >
              <select
                class="form-select"
                id="status"
                th:field="*{status}"
                required
              >
                <option value="ACTIVE">Đang bán</option>
                <option value="INACTIVE">Dừng bán</option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-12">
              <label for="description" class="form-label">Mô tả</label>
              <textarea
                id="description"
                th:field="*{description}"
                class="form-control"
                rows="3"
                placeholder="Thông tin tổng quan về sản phẩm..."
              ></textarea>
            </div>
          </div>

          <div class="row mb-4">
            <div class="col-12">
              <label for="productImage" class="form-label"
                >Hình ảnh sản phẩm</label
              >
              <input
                class="form-control"
                type="file"
                id="productImage"
                name="productImage"
                accept="image/*"
              />
              <button
                type="button"
                id="btnRemoveImage"
                class="btn btn-sm btn-outline-danger mt-2 d-none"
                onclick="removeImage()"
              >
                Xóa file đã chọn
              </button>
            </div>
          </div>
          <hr />

          <div>
            <h4 class="mb-3 mt-4 text-success border-bottom pb-2">
              2. Thông tin chi tiết sản phẩm
            </h4>
            <div class="alert alert-info py-2">
              <i class="bi bi-info-circle"></i> Nhập thông tin chi tiết sản phẩm
              để hoàn thiện hồ sơ.
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="unit" class="form-label">Đơn vị tính *</label>
                <input
                  type="text"
                  id="unit"
                  th:field="*{unit}"
                  class="form-control"
                  placeholder="Cái, Hộp, Bộ..."
                  required
                />
              </div>
              <div class="col-md-6">
                <label for="brand" class="form-label">Thương hiệu</label>
                <input
                  type="text"
                  id="brand"
                  th:field="*{brand}"
                  class="form-control"
                  placeholder="Nhập thương hiệu..."
                />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="warrantyMonths" class="form-label"
                  >Bảo hành (tháng)</label
                >
                <input
                  type="number"
                  id="warrantyMonths"
                  th:field="*{warrantyMonths}"
                  class="form-control"
                  placeholder="0"
                  min="0"
                />
              </div>
              <div class="col-md-6">
                <label for="minStockLevel" class="form-label"
                  >Định mức tồn kho tối thiểu</label
                >
                <input
                  type="number"
                  id="minStockLevel"
                  th:field="*{minStockLevel}"
                  class="form-control"
                  placeholder="0"
                  min="0"
                />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="taxRate" class="form-label"
                  >Thuế suất VAT (%)</label
                >
                <input
                  type="number"
                  step="0.01"
                  id="taxRate"
                  th:field="*{taxRate}"
                  class="form-control"
                  placeholder="10.00"
                  min="0"
                />
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-12">
                <label for="technicalSpecs" class="form-label"
                  >Thông số kỹ thuật</label
                >
                <textarea
                  id="technicalSpecs"
                  th:field="*{technicalSpecs}"
                  class="form-control"
                  rows="4"
                  placeholder="Nhập thông số kỹ thuật chi tiết của sản phẩm..."
                ></textarea>
              </div>
            </div>
          </div>

          <div class="mt-4 pt-3 border-top">
            <button
              class="btn btn-secondary me-2"
              type="button"
              onclick="window.location.href = '/products/view'"
            >
              Hủy
            </button>

            <button
              type="submit"
              class="btn btn-primary"
              onclick="document.getElementById('formAction').value = 'save'"
            >
              <span
                th:text="${product.id != null ? 'Cập Nhật Sản Phẩm' : 'Lưu Sản Phẩm'}"
                >Lưu</span
              >
            </button>
          </div>
        </form>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>
    <script th:src="@{/js/product.js}"></script>
  </body>
</html>
