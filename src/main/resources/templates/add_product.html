<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head th:replace="~{fragments :: html_head}"> </head>
  <body class="product-page overflow-hidden">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="d-flex overflow-hidden" style="height: calc(100vh - 56px)">
      <div th:replace="~{fragments :: sidebar}"></div>
      <main class="flex-grow-1 p-4 overflow-y-auto bg-light h-100">
        <h1>Thông Tin Sản Phẩm</h1>
        <!--name phai khop voi field-->
        <div
          th:if="${errorMessage}"
          class="alert alert-danger alert-dismissible fade show"
          role="alert"
        >
          <span th:text="${errorMessage}"></span>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="alert"
            aria-label="Close"
          ></button>
        </div>
        <form
          id="productForm"
          th:action="${product.id != null ? '/products/edit/' + product.id : '/products/add'}"
          method="post"
          enctype="multipart/form-data"
        >
          <input type="hidden" name="id" th:value="${product.id}" />
          <!-- <div class="row mb-3"> -->
          <div class="mb-3">
            <!-- class="col-md-6" -->
            <label for="name" class="form-label">Tên Sản Phẩm *</label>
            <input
              type="text"
              class="form-control"
              id="name"
              name="name"
              th:value="${product.name}"
              placeholder="Nhập tên sản phẩm... "
              required
            />
          </div>

          <div class="row mb-3">
            <div class="col-md-6">
              <label for="parentCategory" class="form-label"
                >Ngành Hàng *</label
              >
              <select
                class="form-select"
                id="parentCategory"
                name="parentCategory"
                required
              >
                <option value="" selected disabled>Chọn ngành hàng...</option>
                <option
                  th:each="p : ${parentCategories}"
                  th:value="${p.id}"
                  th:text="${p.name}"
                  th:selected="${product?.category?.parent?.id == p.id}"
                ></option>
              </select>
            </div>

            <div class="col-md-6">
              <label for="productType" class="form-label"
                >Loại Sản Phẩm *</label
              >
              <select
                class="form-select"
                id="productType"
                name="productType"
                required
              >
                <option value="" selected disabled>
                  Chọn loại sản phẩm...
                </option>
                <option
                  th:each="c : ${childCategories}"
                  th:value="${c.id}"
                  th:text="${c.name}"
                  th:selected="${product?.category?.id == c.id}"
                ></option>
              </select>
            </div>
          </div>

          <div class="row mb-3 align-items-center">
            <div class="col-md-3">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="checkNewCategory"
                />
                <label
                  class="form-check-label"
                  for="checkNewCategory"
                  style="font-style: italic"
                >
                  Thêm Ngành Hàng Mới:
                </label>
              </div>
            </div>
            <div class="col-md-9">
              <input
                type="text"
                class="form-control"
                id="inputNewCategory"
                name="inputNewCategory"
                placeholder="Nhập ngành hàng mới..."
                disabled
              />
            </div>
          </div>

          <div class="row mb-3 align-items-center">
            <div class="col-md-3">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="checkNewType"
                />
                <label
                  class="form-check-label"
                  for="checkNewType"
                  style="font-style: italic"
                >
                  Thêm Loại Sản Phẩm Mới:
                </label>
              </div>
            </div>
            <div class="col-md-9">
              <input
                type="text"
                id="inputNewType"
                name="inputNewType"
                class="form-control"
                placeholder="Nhập loại sản phẩm mới..."
                disabled
              />
            </div>
          </div>
          <div class="row mb-3">
            <div class="col-12">
              <label for="skuCode" class="form-label">Mã SKU *</label>
              <input
                type="text"
                id="skuCode"
                name="skuCode"
                class="form-control"
                placeholder="Ví dụ: LAP-APP-MBPM3-14"
                th:value="${product.skuCode}"
              />
              <div class="form-text">
                Mã định danh duy nhất cho từng loại sản phẩm.
              </div>
            </div>
          </div>
          <div class="row mb-3">
            <div class="col-12">
              <label for="barCode" class="form-label"
                >Mã Vạch (Barcode) *</label
              >
              <input
                type="text"
                id="barCode"
                name="barCode"
                class="form-control"
                th:value="${product.barCode}"
                placeholder="Nhập mã vạch sản phẩm..."
                required
              />
              <button
                class="btn btn-outline-secondary mt-2"
                type="button"
                id="btnGenerateBarcode"
              >
                <i class="bi bi-qr-code"></i> Sinh mã
              </button>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-12">
              <label for="status" class="form-label">Trạng Thái *</label>
              <select class="form-select" id="status" name="status" required>
                <option
                  th:each="status : ${allStatuses}"
                  th:value="${status}"
                  th:text="${status}"
                  th:selected="${product.status == status}"
                ></option>
              </select>
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-12">
              <label for="quantityStock" class="form-label"
                >Số Lượng Tồn Kho</label
              >
              <input
                type="number"
                id="quantityStock"
                name="quantityStock"
                class="form-control"
                placeholder="0"
                min="0"
                th:value="${product.quantityStock != null ? product.quantityStock : '0'}"
              />
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-12">
              <label for="reservedQuantity" class="form-label"
                >Số Lượng Đặt Trước</label
              >
              <input
                type="number"
                id="reservedQuantity"
                name="reservedQuantity"
                class="form-control"
                placeholder="0"
                value="0"
                min="0"
                th:value="${product.reservedQuantity != null ? product.reservedQuantity : '0'}"
              />
            </div>
          </div>
          <div class="row mb-3">
            <div class="col-12">
              <label for="basePrice" class="form-label">Đơn Giá (VNĐ) </label>
              <input
                type="number"
                id="basePrice"
                name="basePrice"
                class="form-control"
                placeholder="0"
                value="0"
                min="0"
                th:value="${product.basePrice != null ? product.basePrice : '0'}"
              />
            </div>
          </div>

          <div class="row mb-3">
            <div class="col-12">
              <label for="description" class="form-label">Mô tả</label>
              <textarea
                id="description"
                name="description"
                class="form-control"
                rows="4"
                placeholder="Thông tin chi tiết về sản phẩm (không bắt buộc)"
                th:text="${product.description}"
              ></textarea>
            </div>
          </div>
          <div class="row mb-4">
            <div class="col-12">
              <label for="productImage" class="form-label"
                >Hình ảnh sản phẩm</label
              >

              <input
                class="form-control"
                type="file"
                id="productImage"
                name="productImage"
                accept="image/*"
              />

              <button
                type="button"
                id="btnRemoveImage"
                class="btn btn-sm btn-outline-danger mt-2 d-none"
                onclick="removeImage()"
              >
                Xóa file đã chọn
              </button>

              <div class="form-text mt-2">
                Định dạng hỗ trợ: JPG, PNG, GIF. Dung lượng tối đa 2MB.
              </div>
            </div>
          </div>
          <button
            class="btn btn-danger mt-3 me-2"
            type="button"
            onclick="window.location.href = '/products/view'"
          >
            Hủy
          </button>
          <button type="submit" class="btn btn-primary mt-3">
            Lưu Sản Phẩm
          </button>
        </form>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>
    <script th:src="@{/js/product.js}"></script>
  </body>
</html>
