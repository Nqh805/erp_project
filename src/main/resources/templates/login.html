<!doctype html>
<html lang="vi">
  <head th:insert="~{fragments :: html_head}"></head>

  <body class="login-page">
    <div class="login-layout">
      <div class="login-card">
        <h3 class="text-center mb-4">Đăng nhập</h3>

        <form>
          <div class="mb-3">
            <label for="email" class="form-label"
              >Email hoặc Tên đăng nhập</label
            >
            <input
              type="text"
              class="form-control"
              id="email"
              placeholder="nhapemail@vidu.com"
              required
            />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Mật khẩu</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Nhập mật khẩu"
              requiredz
            />
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="remember" />
              <label class="form-check-label" for="remember">
                Ghi nhớ đăng nhập
              </label>
            </div>
            <a href="template/reset_password.html" class="small"
              >Quên mật khẩu?</a
            >
          </div>

          <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
        </form>
      </div>

      <div class="login-card image-card" aria-label="Logo của công ty">
        <img src="./asset/logo.png" alt="Logo của công ty" />
      </div>
    </div>

    <!-- Bootstrap JS (tuỳ chọn) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
