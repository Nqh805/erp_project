<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <!--Thymeleaf do du lieu tu database vao html-->
  <head th:insert="~{fragments :: html_head}"></head>
  <body class="product-page overflow-hidden">
    <div th:replace="~{fragments :: navbar}"></div>

    <div class="d-flex overflow-hidden" style="height: calc(100vh - 56px)">
      <div th:replace="~{fragments :: sidebar}"></div>

      <main class="flex-grow-1 p-4 overflow-y-auto bg-light h-100">
        <h2>Danh sách sản phẩm</h2>
        <div class="card mb-4 shadow-sm">
          <div class="card-body">
            <form
              th:action="@{/products/view}"
              method="get"
              class="row g-3 align-items-end"
            >
              <div class="col-md-4">
                <label for="keyword" class="form-label fw-bold"
                  >Tìm kiếm nhanh</label
                >
                <input
                  type="text"
                  name="keyword"
                  id="keyword"
                  class="form-control"
                  placeholder="Tên sản phẩm, mã SKU hoặc mã vạch..."
                  th:value="${keyword}"
                />
              </div>

              <div class="col-md-2">
                <label for="parentId" class="form-label fw-bold"
                  >Ngành hàng</label
                >
                <select name="parentId" id="parentId" class="form-select">
                  <option value="">-- Tất cả --</option>
                  <option
                    th:each="cat : ${parentCategories}"
                    th:value="${cat.id}"
                    th:text="${cat.name}"
                    th:selected="${cat.id == selectedParent}"
                  ></option>
                </select>
              </div>

              <div class="col-md-2">
                <label for="childId" class="form-label fw-bold"
                  >Phân loại</label
                >
                <select name="childId" id="childId" class="form-select">
                  <option value="">-- Tất cả --</option>
                  <option
                    th:each="child : ${childCategories}"
                    th:value="${child.id}"
                    th:text="${child.name}"
                    th:selected="${child.id == selectedChild}"
                  ></option>
                </select>
              </div>

              <div class="col-md-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary flex-grow-1">
                  <i class="bi bi-search"></i> Lọc dữ liệu
                </button>

                <a
                  th:href="@{/products/view}"
                  class="btn btn-outline-secondary"
                >
                  Xóa lọc
                </a>

                <a
                  th:href="@{/products/add}"
                  class="btn btn-success text-nowrap"
                >
                  <i class="bi bi-plus-lg"></i> Thêm mới
                </a>
              </div>
            </form>
          </div>
        </div>

        <div
          th:if="${successMessage}"
          class="alert alert-success alert-dismissible fade show"
          role="alert"
        >
          <i class="bi bi-check-circle-fill me-2"></i>
          <span th:text="${successMessage}"></span>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>

        <div
          th:if="${errorMessage}"
          class="alert alert-danger alert-dismissible fade show"
          role="alert"
        >
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span th:text="${errorMessage}"></span>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="modal"
            aria-label="Close"
          ></button>
        </div>
        <div class="table-responsive">
          <table class="table table-striped table-bordered table-hover mt-3">
            <thead class="sticky-top bg-white" style="z-index: 1">
              <tr>
                <th scope="col">STT</th>
                <th scope="col">Hình Ảnh</th>
                <th scope="col">Tên Sản Phẩm</th>
                <th scope="col">Mã SKU</th>
                <th scope="col">Mã Vạch</th>
                <th scope="col">Ngành Hàng</th>
                <th scope="col">Phân Loại</th>
                <th scope="col">Giá Bán</th>
                <th scope="col">Tồn Kho</th>
                <th scope="col">Đặt Trước</th>
                <th scope="col">Trạng Thái</th>
                <th scope="col">Mô Tả</th>
                <th scope="col">Thao Tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="p, state : ${products}">
                <td th:text="${state.index + 1}"></td>
                <td class="align-middle text-center">
                  <a
                    th:href="${p.imgURL}"
                    class="product-gallery"
                    th:if="${p.imgURL != null}"
                  >
                    <img
                      th:src="${p.imgURL}"
                      id="product-image"
                      alt="Product Image"
                      class="img-thumbnail"
                    />
                  </a>
                  <img
                    src="/asset/images/no-image.png"
                    id="no-image"
                    alt="No Image"
                    th:unless="${p.imgURL != null}"
                  />
                </td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.skuCode}"></td>
                <td th:text="${p.barCode}"></td>

                <td th:text="${p.category.parent.name}"></td>
                <td th:text="${p.category.name}"></td>

                <td
                  th:text="${#numbers.formatDecimal(p.basePrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"
                ></td>

                <td th:text="${p.quantityStock}"></td>
                <td th:text="${p.reservedQuantity}"></td>
                <td th:switch="${p.status.name()}">
                  <span th:case="'ACTIVE'" class="badge bg-success"
                    >Đang bán</span
                  >
                  <span th:case="'INACTIVE'" class="badge bg-danger"
                    >Dừng bán</span
                  >
                  <span
                    th:case="'OUT_OF_STOCK'"
                    class="badge bg-warning text-dark"
                    >Hết hàng</span
                  >
                  <span th:case="'DISCONTINUED'" class="badge bg-secondary"
                    >Ngừng kinh doanh</span
                  >
                </td>

                <td th:text="${p.description}"></td>
                <td class="align-middle text-center text-nowrap">
                  <a
                    th:href="@{'/products/edit/' + ${p.id}}"
                    class="btn btn-sm btn-outline-primary me-1"
                    >Sửa</a
                  >
                  <button
                    type="button"
                    class="btn btn-sm btn-outline-danger"
                    data-bs-toggle="modal"
                    data-bs-target="#deleteModal"
                    th:attr="data-product-id=${p.id}"
                  >
                    Xóa
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <div
      class="modal fade"
      id="deleteModal"
      tabindex="-1"
      aria-labelledby="deleteModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="deleteModalLabel">Xác nhận xóa</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            Bạn có chắc chắn muốn xóa sản phẩm này? Hành động này không thể hoàn
            tác.
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Hủy
            </button>
            <form id="deleteForm" method="post">
              <button type="submit" class="btn btn-danger">Xác nhận Xóa</button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.0/simple-lightbox.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script th:src="@{/js/admin.js}"></script>
    <script th:src="@{/js/product.js}"></script>
  </body>
</html>
