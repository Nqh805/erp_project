<!doctype html>
<html lang="vi">
  <head th:insert="~{fragments :: html_head}"></head>

  <body class="login-page reset-page">
    <div class="login-layout login-layout--single">
      <div class="login-card">
        <h3 class="text-center mb-2">Quên mật khẩu</h3>
        <p class="text-center text-muted small mb-4">
          Nhập email để nhận liên kết đặt lại mật khẩu.
        </p>

        <form>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="nhapemail@vidu.com"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary w-100">
            Gửi liên kết đặt lại
          </button>

          <p class="text-center mt-3 mb-0">
            <a th:href="@{login}">Quay lại đăng nhập</a>
          </p>
        </form>
      </div>
    </div>

    <!-- Bootstrap JS (tuỳ chọn) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
